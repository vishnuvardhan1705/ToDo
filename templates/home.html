
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .form-control{
        padding: 1.375rem .75rem !important;
    }
    </style>
</head>
<body style="background-color: rgb(232, 228, 223);">
    <div class="container">
        <h3 class="pt-5 text-center" style="font-style: italic; font-size:30px; text-decoration: underline;">Django ToDo App</h3>
        <div class="row">
            <h4>My Day</h4>
            <p class="text-muted"></p>
            <div class="col-md-7 col-lg-7" style="height: 450px; overflow: scroll;">
                {% for task in task %}
                <div class="card m-1">
                    <div class="card-body">
                        {{task.task}}
                        <span style="position: relative; float: right;">
                            <a href="" class="btn btn-success"><i class="fa fa-check"></i> Mark as Done</a>
                            <a href="" class="btn btn-danger"><i class="fa fa-trash"></i></a>
                            <a href="" class="btn btn-primary"><i class="fa fa-pencil"></i></a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="col-md- col-lg-5">
                <h5>Completed Tasks</h5>
                {% for task in competed_task %}
                <div class="card m-1">
                    <div class="card-body">
                        {{task.task}}
                        <span style="position: relative; float: right;">
                            <a href="" class="btn btn-danger"><i class="fa fa-times"></i> Mark as Undone</a>
                        </span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 col-lg-6 p-0" style="position: absolute; bottom: 50px;">
                <!-- To Do Form -->
                <form action="" >
                    <div class="form-group">
                        <span style="display: flex;">
                            <input  type="text" name="task" class="form-control"  placeholder="Add a task">
                            <button type="submit" class="btn btn-primary" style="width: 100px;"><i class="fa fa-plus"></i> Add</button>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
